<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <style>
      .logo-stroke { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .logo-fill { fill: #333333; }
    </style>
  </defs>
  
  <!-- Shield Outline -->
  <path d="M 200 40 L 100 100 L 100 220 Q 100 320 200 380 Q 300 320 300 220 L 300 100 Z" class="logo-stroke" stroke-width="3"/>
  
  <!-- Decorative Stars -->
  <g class="logo-fill">
    <!-- Top left star -->
    <circle cx="130" cy="90" r="2.5"/>
    <circle cx="140" cy="95" r="2"/>
    <!-- Top center star -->
    <circle cx="160" cy="75" r="3"/>
    <!-- Top center right star -->
    <circle cx="185" cy="82" r="2"/>
    <!-- Top right stars -->
    <circle cx="260" cy="92" r="2.5"/>
    <circle cx="270" cy="88" r="2"/>
  </g>
  
  <!-- Decorative lines beside graduation cap -->
  <line x1="85" y1="155" x2="105" y2="155" class="logo-stroke" stroke-width="2"/>
  <line x1="85" y1="168" x2="105" y2="168" class="logo-stroke" stroke-width="2"/>
  <line x1="295" y1="155" x2="315" y2="155" class="logo-stroke" stroke-width="2"/>
  <line x1="295" y1="168" x2="315" y2="168" class="logo-stroke" stroke-width="2"/>
  
  <!-- Graduation Cap -->
  <g class="logo-stroke" stroke-width="2.5">
    <!-- Mortarboard -->
    <path d="M 140 150 L 200 115 L 260 150"/>
    <!-- Cap top -->
    <rect x="160" y="140" width="80" height="12" rx="2"/>
    <!-- Tassel line -->
    <line x1="200" y1="152" x2="200" y2="195"/>
    <!-- Tassel ball -->
    <circle cx="200" cy="200" r="4"/>
  </g>
  
  <!-- Books Stack -->
  <g class="logo-stroke" stroke-width="2.5">
    <!-- Book 1 (bottom) - Light blue -->
    <rect x="135" y="215" width="130" height="20" rx="2"/>
    <path d="M 135 215 L 132 210 L 262 210 L 265 215"/>
    
    <!-- Book 2 (middle) - Orange -->
    <rect x="145" y="192" width="110" height="18" rx="2"/>
    <path d="M 145 192 L 142 188 L 252 188 L 255 192"/>
    
    <!-- Book 3 (top/cover) -->
    <rect x="160" y="171" width="80" height="17" rx="2"/>
    <path d="M 160 171 L 157 167 L 237 167 L 240 171"/>
  </g>
  
  <!-- Open book at bottom -->
  <g class="logo-stroke" stroke-width="2">
    <path d="M 130 245 Q 150 260 200 265 Q 250 260 270 245"/>
    <path d="M 200 245 L 200 270"/>
    <!-- Wavy pages -->
    <path d="M 135 255 Q 145 258 155 256"/>
    <path d="M 245 256 Q 255 258 265 255"/>
  </g>
  
  <!-- Bottom star -->
  <g class="logo-fill">
    <path d="M 200 340 L 203 348 L 212 348 L 206 353 L 209 361 L 200 356 L 191 361 L 194 353 L 188 348 L 197 348 Z"/>
  </g>
</svg>
