services:
  - type: web
    name: collegeos-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run db:migrate && npm start
    envVars:
      - key: DATABASE_URL
        sync: false # Render will prompt you to enter your Neon DATABASE_URL
      - key: JWT_SECRET
        generateValue: true # Render will automatically generate a secure random secret key for you
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false # Render will prompt you to enter your Vercel frontend URL
