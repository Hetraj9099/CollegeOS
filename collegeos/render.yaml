services:
  - type: web
    name: collegeos-backend
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: cd backend && npm ci --no-audit && npm run build
    startCommand: cd backend && NODE_ENV=production npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
