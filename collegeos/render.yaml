services:
  - type: web
    name: collegeos-backend
    runtime: node
    region: oregon
    plan: free
    branch: main
    nodeVersion: 20
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
